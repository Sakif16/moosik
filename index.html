<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>moosik</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="player">
    <div class="title-bar">
      <span class="title-bar-text">MOOSIK</span>
      <div class="title-bar-controls">
        <button class="tb-btn" id="btn-minimize">_</button>
        <button class="tb-btn" id="btn-maximize">▢</button>
        <button class="tb-btn" id="btn-close">✕</button>
      </div>
    </div>

    <div class="body">
      <div class="display-row">
        <div class="visualizer">
          <div class="viz-top">
            <span class="play-icon" id="play-icon">▶</span>
            <span class="time-display" id="time-display">00:00</span>
          </div>
          <div class="viz-bars">
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span>
          </div>
        </div>

        <div class="info-col">
          <div class="track-info" id="track-info">No track loaded</div>
          <div class="meta-row">
            <div class="meta-box">128 <small>Kbps</small></div>
            <div class="meta-box">40 <small>Khz</small></div>
            <button class="toggle-btn" id="btn-eq">EQ</button>
            <button class="toggle-btn" id="btn-pl">PL</button>
          </div>
        </div>
      </div>

      <div class="progress-row">
        <input type="range" id="progress-bar" min="0" max="100" value="0" />
      </div>

      <div class="controls-row">
        <button class="ctrl-btn" id="btn-prev">◀◀</button>
        <button class="ctrl-btn" id="btn-play">▶</button>
        <button class="ctrl-btn" id="btn-stop">■</button>
        <button class="ctrl-btn" id="btn-pause">❙❙</button>
        <button class="ctrl-btn" id="btn-next">▶▶</button>
        <button class="ctrl-btn" id="btn-eject">⏏</button>

        <div class="right-controls">
          <button class="toggle-btn" id="btn-shuffle">SHUFFLE</button>
          <button class="ctrl-btn small" id="btn-repeat">⟲</button>
        </div>
      </div>
    </div>

    <div class="playlist-panel hidden" id="playlist-panel">
      <div class="playlist-header">
        <button class="toggle-btn" id="btn-back">← BACK</button>
        <span>PLAYLISTS</span>
        <button class="toggle-btn" id="btn-add-playlist">+ ADD</button>
      </div>
      <div class="playlist-list" id="playlist-list">
        <div class="empty-msg">No playlists yet. Click + ADD.</div>
      </div>
    </div>
  </div>

  <audio id="audio-player"></audio>

  <script src="renderer.js"></script>
</body>
</html>
